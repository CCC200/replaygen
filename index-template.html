<!DOCTYPE html>
<head>
    <title>Replays</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        /* Style taken from https://codepen.io/jgentes/pen/nrWOmJ */
        body {
            padding: 1em;
            background: #d2d4dd;
            background-image: linear-gradient(90deg, transparent 30%, rgba(0, 0, 0, 0.02) 45%, rgba(0, 0, 0, 0.02) 55%, transparent 70%);
            background-size: 8px 8px;
            font: 100%/1.5 sans-serif;
            text-shadow: 0 1px 1px white;
        }
        h1 {
            user-select: none;
        }
        a {
            position: relative;
            display: block;
            padding: 1em;
            border: silver solid 1px;
            border-top-width: 0;
            background: white;
            font: bold 110% sans-serif;
            border-top-width: 0;
            text-align: left;
            user-select: none;
            @media screen and (min-width: 300px) {
                width: 90%;
            }
            @media screen and (min-width: 800px) {
                width: 65%;
            }
        }
        a:first-of-type {
            border-top-width: 1px;
            border-radius: 0.6em 0.6em 0 0;
        }
        a:last-of-type {
            border-radius: 0 0 0.6em 0.6em;
            box-shadow: 0 1px hsla(0, 0%, 100%, 0.8);
        }
        a:link, a:visited {
            color: black;
            text-decoration: none;
        }
        a:hover {
            color: #7b82a0;
        }
        select {
            @media screen and (min-width: 300px) {
                width: 80%;
            }
            @media screen and (min-width: 800px) {
                width: 40%;
            }
            font-size: large;
        }
    </style>
</head>
<body>
    <h1 align="center">Replays</h1>
    <p align="center">
        <select id="formatfilter" onchange="changeFilter()">
            <option value="all">All</option>
            <!-- FORMAT_FILTERS -->
        </select>
    </p>
    <p id="replayentries" align="center">
        <!-- REPLAY_ENTRIES -->
    </p>
</body>
<script>
var replay_cache;
window.onload = (event) => {
  replay_cache = document.getElementById("replayentries").innerHTML;
};
function changeFilter() {
    var fval = document.getElementById("formatfilter").value;
    var replayp = document.getElementById("replayentries");
    replayp.innerHTML = replay_cache;
    if(fval == 'all') return;
    const entries = replayp.querySelectorAll("a");
    entries.forEach(function(a) {
        if(!a.innerHTML.includes(fval)) a.style.display = "none";
    });
}
</script>
</html>
